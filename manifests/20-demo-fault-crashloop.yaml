apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-crashloop
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-crashloop
  template:
    metadata:
      labels:
        app: demo-crashloop
    spec:
      containers:
        - name: crash
          image: busybox:1.36
          command: ["sh", "-c", "echo 'intentional crash for demo'; exit 1"]
